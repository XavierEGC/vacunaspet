<div class="d-flex">

  <aside class="sidebar d-flex flex-column p-3" *ngIf="mostrarSidebar">
    <div class="mb-4">
      <div class="fw-bold fs-5" style="color: var(--teal)">🐾 VacunasPet</div>
      <small style="color: var(--text-soft)">Gestión veterinaria</small>
    </div>

    <nav class="d-flex flex-column gap-1">
      <a routerLink="/dashboard" routerLinkActive="active"
         class="nav-link px-3 py-2 rounded fw-semibold" style="color: var(--text-dark)">
        <i class="bi bi-house me-2"></i> Inicio
      </a>
      <a routerLink="/mascotas" routerLinkActive="active"
         class="nav-link px-3 py-2 rounded fw-semibold" style="color: var(--text-dark)">
        <i class="bi bi-heart me-2"></i> Mascotas
      </a>
      <a routerLink="/vacunas" routerLinkActive="active"
         class="nav-link px-3 py-2 rounded fw-semibold" style="color: var(--text-dark)">
        <i class="bi bi-capsule me-2"></i> Vacunas
      </a>
      <a routerLink="/registros" routerLinkActive="active"
         class="nav-link px-3 py-2 rounded fw-semibold" style="color: var(--text-dark)">
        <i class="bi bi-clipboard-check me-2"></i> Registros
      </a>
    </nav>

    <div class="mt-auto pt-3" style="border-top: 1px solid var(--border)">
      <button class="nav-link px-3 py-2 rounded fw-semibold w-100 text-start border-0 bg-transparent"
              style="color: var(--coral)" (click)="cerrarSesion()">
        <i class="bi bi-box-arrow-left me-2"></i> Cerrar sesión
      </button>
    </div>
  </aside>

  <main [class]="mostrarSidebar ? 'main-content w-100' : 'w-100'">
    <router-outlet />
    <app-footer *ngIf="mostrarSidebar"></app-footer>
  </main>

</div>
