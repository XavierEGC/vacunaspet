<div class="p-4">
  <!-- Encabezado -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h2 class="fw-bold mb-0" style="color: var(--text-dark)">
        <i class="bi bi-heart me-2" style="color: var(--coral)"></i>Mascotas
      </h2>
      <small style="color: var(--text-soft)">Mascotas registradas en el sistema</small>
    </div>
    <button class="btn-teal" data-bs-toggle="collapse" data-bs-target="#formMascota">
      <i class="bi bi-plus-circle me-1"></i> Nueva mascota
    </button>
  </div>

  <!-- Alerta -->
  <div *ngIf="mensaje" class="alert alert-success">{{ mensaje }}</div>

  <!-- Formulario -->
  <div class="collapse mb-4" id="formMascota">
    <div class="card p-4">
      <h5 class="fw-bold mb-3" style="color: var(--teal)">Registrar nueva mascota</h5>
      <div class="row g-3">
        <div class="col-md-4">
          <label class="form-label fw-semibold">Nombre</label>
          <input type="text" class="form-control" [(ngModel)]="nueva.nombre" placeholder="Ej: Max">
        </div>
        <div class="col-md-4">
          <label class="form-label fw-semibold">Especie</label>
          <select class="form-select" [(ngModel)]="nueva.especie" (ngModelChange)="onEspecieChange()">
            <option value="perro">🐕 Perro</option>
            <option value="gato">🐈 Gato</option>
            <option value="conejo">🐇 Conejo</option>
            <option value="ave">🦜 Ave</option>
            <option value="hamster">🐹 Hámster</option>
            <option value="cobaya">🐾 Cobaya</option>
            <option value="tortuga">🐢 Tortuga</option>
            <option value="pez">🐟 Pez</option>
            <option value="reptil">🦎 Reptil</option>
            <option value="otro">🐾 Otro</option>
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label fw-semibold">Raza</label>
          <select class="form-select" [(ngModel)]="nueva.raza">
            <option *ngFor="let r of razas" [value]="r">{{ r }}</option>
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label fw-semibold">Fecha de nacimiento</label>
          <input type="date" class="form-control" [(ngModel)]="nueva.fechaNacimiento">
        </div>
        <div class="col-12">
          <button class="btn-teal" (click)="guardar()">
            <i class="bi bi-save me-1"></i> Guardar
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Tarjetas -->
  <div class="row g-3" *ngIf="mascotas.length > 0">
    <div class="col-md-4" *ngFor="let m of mascotas">
      <div class="card h-100">
        <div class="p-3 text-center" style="background: var(--teal-light); border-radius: 12px 12px 0 0; font-size: 3rem">
          {{ getEmoji(m.especie) }}
        </div>
        <div class="card-body p-3">
          <div class="d-flex justify-content-between align-items-center mb-2">
            <span class="fw-bold fs-5">{{ m.nombre }}</span>
            <span class="badge" style="background: var(--teal-light); color: var(--teal-dark)">{{ m.especie }}</span>
          </div>
          <p class="mb-1" style="color: var(--text-soft); font-size: 0.85rem">
            <i class="bi bi-tag me-1"></i>{{ m.raza || 'Sin raza' }}
          </p>
          <p class="mb-3" style="color: var(--text-soft); font-size: 0.85rem">
            <i class="bi bi-calendar me-1"></i>{{ m.fechaNacimiento || 'Sin fecha' }}
          </p>
          <button class="btn btn-sm btn-outline-danger w-100" (click)="eliminar(m.id!)">
            <i class="bi bi-trash me-1"></i> Eliminar
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Sin mascotas -->
  <div class="card p-5 text-center" *ngIf="mascotas.length === 0">
    <div style="font-size: 3rem">🐾</div>
    <p class="mt-2 fw-semibold" style="color: var(--text-soft)">No hay mascotas registradas</p>
  </div>
</div>
