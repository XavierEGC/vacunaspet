<div class="login-wrapper">
  <!-- Lado izquierdo - imagen -->
  <div class="login-left">
    <div class="login-overlay">
      <div class="login-brand">
        <span style="font-size: 3rem">🐾</span>
        <h1 class="fw-bold text-white mt-3">VacunasPet</h1>
        <p class="text-white opacity-75">Sistema de gestión de vacunación municipal para mascotas</p>
      </div>
      <div class="login-stats">
        <div class="stat-item">
          <span class="stat-number">ODS 9</span>
          <span class="stat-label">Infraestructura</span>
        </div>
        <div class="stat-item">
          <span class="stat-number">100%</span>
          <span class="stat-label">Digital</span>
        </div>
        <div class="stat-item">
          <span class="stat-number">24/7</span>
          <span class="stat-label">Disponible</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Lado derecho - formulario -->
  <div class="login-right">
    <div class="login-form-container">
      <div class="text-center mb-4">
        <span style="font-size: 2.5rem">🐾</span>
        <h2 class="fw-bold mt-2" style="color: var(--text-dark)">Bienvenido</h2>
        <p style="color: var(--text-soft)">Ingresa a tu cuenta VacunasPet</p>
      </div>

      <!-- Alerta error -->
      <div *ngIf="error" class="alert alert-danger d-flex align-items-center gap-2">
        <i class="bi bi-exclamation-triangle"></i> {{ error }}
      </div>

      <!-- Formulario -->
      <div class="mb-3">
        <label class="form-label fw-semibold">Usuario</label>
        <div class="input-group">
          <span class="input-group-text" style="background: var(--teal-light); border-color: var(--border)">
            <i class="bi bi-person" style="color: var(--teal)"></i>
          </span>
          <input type="text" class="form-control" [(ngModel)]="username"
                 placeholder="Tu usuario" (keyup.enter)="login()">
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label fw-semibold">Contraseña</label>
        <div class="input-group">
          <span class="input-group-text" style="background: var(--teal-light); border-color: var(--border)">
            <i class="bi bi-lock" style="color: var(--teal)"></i>
          </span>
          <input [type]="showPass ? 'text' : 'password'" class="form-control"
                 [(ngModel)]="password" placeholder="Tu contraseña" (keyup.enter)="login()">
          <button class="input-group-text" style="border-color: var(--border); cursor: pointer"
                  (click)="showPass = !showPass">
            <i class="bi" [class.bi-eye]="!showPass" [class.bi-eye-slash]="showPass"
               style="color: var(--text-soft)"></i>
          </button>
        </div>
      </div>

      <!-- Botón login -->
      <button class="btn w-100 py-2 fw-bold mb-3" (click)="login()"
              style="background: var(--teal); color: white; border-radius: 10px; font-size: 1rem">
        <i class="bi bi-box-arrow-in-right me-2"></i>
        {{ cargando ? 'Ingresando...' : 'Iniciar sesión' }}
      </button>

      <!-- Divider -->
      <div class="d-flex align-items-center gap-3 mb-3">
        <hr class="flex-grow-1">
        <span style="color: var(--text-soft); font-size: 0.85rem">o continúa con</span>
        <hr class="flex-grow-1">
      </div>

      <!-- Social login -->
      <div class="d-flex gap-2 mb-4">
        <button class="btn btn-outline-secondary flex-grow-1 py-2"
                style="border-radius: 10px; font-size: 0.88rem">
          <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg"
               width="18" class="me-2"> Google
        </button>
        <button class="btn btn-outline-secondary flex-grow-1 py-2"
                style="border-radius: 10px; font-size: 0.88rem">
          <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/github/github-original.svg"
               width="18" class="me-2"> GitHub
        </button>
      </div>

      <!-- Footer -->
      <p class="text-center mb-0" style="color: var(--text-soft); font-size: 0.82rem">
        ¿Problemas para ingresar?
        <a href="#" style="color: var(--teal)">Contacta al administrador</a>
      </p>
    </div>
  </div>
</div>
